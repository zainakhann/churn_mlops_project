#LOCAL ADVANCED CI/CD 
name: Local Advanced CI/CD

on:
  push:
    branches: [main]

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc scikit-learn joblib

      - run: dvc pull || echo "skip"

      - run: python src/train.py

      - run: python src/evaluate.py

      - run: python src/check_threshold.py

      - uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            metrics.txt


  docker:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t churn-mlops:latest .

      - run: docker tag churn-mlops:latest zainakhann/churn-mlops:latest

      - run: docker push zainakhann/churn-mlops:latest